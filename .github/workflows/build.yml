name: Build

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Run Tests
        run: ./gradlew test

      - name: Build Plugin
        run: ./gradlew buildPlugin

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-bell-plugin
          path: build/distributions/*.zip

  verify:
    name: Plugin Verifier
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Plugin Verifier
        run: ./gradlew runPluginVerifier

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests and generate coverage report
        run: ./gradlew test jacocoTestReport --no-build-cache

      - name: Debug — verify build outputs
        run: |
          echo "=== JaCoCo exec ==="
          find build/jacoco -name "*.exec" 2>/dev/null && echo "found" || echo "MISSING"
          echo "=== JaCoCo XML ==="
          find build -name "jacocoTestReport.xml" 2>/dev/null && echo "found" || echo "MISSING"
          echo "=== Main classes ==="
          find build/classes/kotlin/main -name "*.class" 2>/dev/null | head -5 || echo "MISSING"
          echo "=== XML head ==="
          head -20 build/reports/jacoco/test/jacocoTestReport.xml 2>/dev/null || echo "XML not found"

      - name: Install sonar-scanner
        run: |
          curl -sSLo sonar-scanner.zip \
            https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.2.1.4610-linux-x64.zip
          unzip -q sonar-scanner.zip
          echo "${GITHUB_WORKSPACE}/sonar-scanner-6.2.1.4610-linux-x64/bin" >> $GITHUB_PATH

      - name: SonarCloud Scan (PR)
        if: github.event_name == 'pull_request'
        run: >
          sonar-scanner
          -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
          -Dsonar.pullrequest.branch=${{ github.head_ref }}
          -Dsonar.pullrequest.base=${{ github.base_ref }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Scan (branch)
        if: github.event_name == 'push'
        run: sonar-scanner -Dsonar.branch.name=${{ github.ref_name }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  qodana:
    name: Qodana Analysis
    runs-on: ubuntu-latest
    needs: quality
    if: vars.ENABLE_QODANA == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

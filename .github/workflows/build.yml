name: Build

on:
  push:
    branches: [main, develop, 'feature/**', 'chore/**']
  pull_request:
    branches: [main, develop]

jobs:
  cc-check:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit messages
        run: |
          msgs=$(git log --format="%s" --no-merges origin/${{ github.base_ref }}..HEAD \
            | grep -vP '^(Revert|fixup!|squash!)' || true)
          [ -z "$msgs" ] && exit 0
          echo "$msgs" | while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if ! echo "$msg" | grep -qP '^(feat|fix|docs|style|refactor|test|build|ci|perf|chore|revert)(\(.+\))?!?: .+'; then
              echo "Fora do padrão Conventional Commits: $msg"
              exit 1
            fi
          done

  branch-policy:
    name: Branch Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Validate source branch
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ "$BRANCH" != "develop" && "$BRANCH" != hotfix/* ]]; then
            echo "PRs para main só são permitidos de 'develop' ou 'hotfix/*'. Branch: $BRANCH"
            exit 1
          fi

  auto-merge:
    name: Enable Auto Merge
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'develop' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --merge "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  quality:
    name: Quality & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Run Tests
        run: ./gradlew test

      - name: Debug — JaCoCo offline instrumentation
        if: always()
        run: |
          echo "=== Instrumented classes ==="
          COUNT=$(find build/jacoco/instrumented-main -name "*.class" 2>/dev/null | wc -l)
          echo "Instrumented class count: $COUNT"
          find build/jacoco/instrumented-main -name "*.class" 2>/dev/null | head -5 || echo "MISSING — instrumentForCoverage did not run"
          echo "=== test.exec ==="
          ls -lh build/jacoco/test.exec 2>/dev/null || echo "test.exec MISSING"
          echo "=== BuildBell in test.exec? ==="
          strings build/jacoco/test.exec 2>/dev/null | grep -i "buildbell\|matheuh\|br/com" | head -10 || echo "BuildBell NOT FOUND in test.exec"
          echo "=== Full JaCoCo XML ==="
          cat build/reports/jacoco/test/jacocoTestReport.xml 2>/dev/null || echo "XML not found"

      - name: Build Plugin
        run: ./gradlew buildPlugin

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-bell-plugin
          path: build/distributions/*.zip

  verify:
    name: Plugin Verifier
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Plugin Verifier
        run: ./gradlew runPluginVerifier

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests and generate coverage report
        run: ./gradlew test jacocoTestReport --no-build-cache

      - name: Debug — JaCoCo offline instrumentation
        run: |
          echo "=== Instrumented classes ==="
          COUNT=$(find build/jacoco/instrumented-main -name "*.class" 2>/dev/null | wc -l)
          echo "Instrumented class count: $COUNT"
          find build/jacoco/instrumented-main -name "*.class" 2>/dev/null | head -5 || echo "MISSING — instrumentForCoverage did not run"
          echo "=== test.exec ==="
          ls -lh build/jacoco/test.exec 2>/dev/null || echo "test.exec MISSING"
          echo "=== BuildBell in test.exec? ==="
          strings build/jacoco/test.exec 2>/dev/null | grep -i "buildbell\|matheuh\|br/com" | head -10 || echo "BuildBell NOT FOUND in test.exec"
          echo "=== Full JaCoCo XML ==="
          cat build/reports/jacoco/test/jacocoTestReport.xml 2>/dev/null || echo "XML not found"

      - name: Install sonar-scanner
        run: |
          curl -sSLo sonar-scanner.zip \
            https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.2.1.4610-linux-x64.zip
          unzip -q sonar-scanner.zip
          echo "${GITHUB_WORKSPACE}/sonar-scanner-6.2.1.4610-linux-x64/bin" >> $GITHUB_PATH

      - name: SonarCloud Scan (PR)
        if: github.event_name == 'pull_request'
        run: >
          sonar-scanner
          -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
          -Dsonar.pullrequest.branch=${{ github.head_ref }}
          -Dsonar.pullrequest.base=${{ github.base_ref }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Scan (branch)
        if: github.event_name == 'push'
        run: sonar-scanner -Dsonar.branch.name=${{ github.ref_name }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  qodana:
    name: Qodana Analysis
    runs-on: ubuntu-latest
    needs: quality
    if: vars.ENABLE_QODANA == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
